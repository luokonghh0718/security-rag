version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security-rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/data:/app/app/data
      - ./data/chroma_db:/data/chroma_db
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - CHROMA_PERSIST_DIR=/data/chroma_db
    restart: unless-stopped
    networks:
      - security-rag-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: security-rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - security-rag-net

networks:
  security-rag-net:
    driver: bridge
